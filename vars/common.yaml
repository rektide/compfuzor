---
# primary directories
NAME: "{{TYPE}}{{'-'+INSTANCE if INSTANCE is defined else ''}}"
TYPE: "{{ (lookup('file', '/proc/self/cmdline') | regex_replace('\u0000',' ')|ansible_cmdline).type }}"
INSTANCE_CMDLINE: "{{ (lookup('file', '/proc/self/cmdline') | regex_replace('\u0000',' ')|ansible_cmdline).instance }}"
INSTANCE: "{{ 'git' if INSTANCE_CMDLINE|def == 'src' and REPO|def is defined else 'main' }}"
BINS_DIR: "{{DIR}}/bin"
GLOBAL_BINS_DIR: /usr/local/bin
SRVS_DIR: /srv
OPTS_DIR: /opt
ETCS_DIR: /etc/opt
REPOS_DIR: /etc/opt
VARS_DIR: /var/lib
LOGS_DIR: /var/log
SPOOLS_DIR: /var/spool
CACHES_DIR: /var/cache
PIDS_DIR: /var/run
RUNS_DIR: /var/run
SRCS_DIR: /usr/local/src
ARCHIVE_SRC: "{{HOMEDIR}}archive/{{REPO_ORG}}/{{REPO_NAME}}"
SHARES_DIR: /usr/share

# Archive download mode
ARCHIVE_DOWNLOAD: true
ARCHIVE_DIR: "{{HOMEDIR}}archive"

USERMODE_BINS_DIR: "{{BINS_DIR}}"
USERMODE_ETCS_DIR: "{{XDG_CONFIG_HOME}}"
USERMODE_CACHE_DIR: "{{XDG_CACHE_HOME}}/.cache"
USERMODE_LOCAL_DIR: "{{XDG_DATA_HOME|dirname}}"
USERMODE_GLOBAL_BINS_DIR: "{{USERMODE_LOCAL_DIR}}/bin"
USERMODE_OPTS_DIR: "{{USERMODE_LOCAL_DIR}}/opt"
USERMODE_SRVS_DIR: "{{USERMODE_LOCAL_DIR}}/srv"
USERMODE_VARS_DIR: "{{USERMODE_LOCAL_DIR}}/var/lib"
USERMODE_SRCS_DIR: "{{HOMEDIR}}/src"
USERMODE_LOGS_DIR: "{{USERMODE_VARS_DIR}}/log"
USERMODE_SPOOLS_DIR: "{{USERMODE_VARS_DIR}}/spool"
USERMODE_CACHES_DIR: "{{HOMEDIR}}/.cache"
USERMODE_MEDIAS_DIR: "{{USERMODE_LOCAL_DIR}}/media"
USERMODE_SHARES_DIR: "{{USERMODE_LOCAL_DIR}}/usr/share"

REPO_DIR: "{{SRC}}"
REPO_LINK_DIR: repo
BUILD_DIR_DIR: "{{REPO_DIR}}"
BUILD_DIR: "{{BUILD_DIR_DIR}}/build"
_BUILD_DIR: "{{BUILD_DIR|defaultDir(BUILD_DIR_DIR)}}"
WORKDIR_BIN: /usr/share/doc/git/contrib/workdir/git-new-workdir
PKGCONFIG_DIR: "/usr/local/lib/pkgconfig"
PKGSS_DIR: "{{SRCS_DIR}}"
SPECS_DIR: "{{SRCS_DIR}}/spec"
SYSCTL_DIR: "/etc/sysctl.d"
WWW_LINKS_D: /etc/lighttpd2/links.d
NGINX: /etc/nginx
# package installation config
APT_INSTALL: latest
APT_BYPASS: False
APT_DEFAULT_COMPONENT: main
APT_DEFAULT_DISTRIBUTION: forky
APT_DEFAULT_ARCH: True
APT_DEFAULT_MIRROR: http://deb.debian.org/debian
APT_ARCH: amd64
UBUNTU_DISTRIBUTION: noble
TMUX_CONF_D_DIR: conf.d
BIND: 0.0.0.0
NODEJS_VERSION: 25
PNPM_VERSION: 10
BUN_VERSION: 1
GO_VERSION: 1
RUST_VERSION: 1
PYTHON_VERSION: 3
YARN_VERSION: 4

DIRSET:
  - opt
  - srv
  - etc
  - var
  - log
  - spool
  - cache
  - src
  - pid
  - share
FONTS_TTF: /usr/share/fonts/truetype
MEDIAS_DIR: /srv/media
SYSTEMD_SYSTEM_UNIT_DIR: /etc/systemd/system
DIRMODE: "0770"
FILEMODE: "0660"
BINMODE: "0775"
GO_DIR: "src/{{go_url|default('')|deprefix('\\w+@')|deprefix('https?://')|regex_replace('^(\\w+):', '\\1/')|trim}}"
HASH: "#"
PERSIST_VARS:
  - NAME
  - INSTANCE
  - DIR
  - PREFIX
  - USER
  - USERMODE
  - OWNER
  - APT_COMPONENT
  - APT_COMPONENTS
  - APT_TRUSTED
  - APT_SOURCELIST
  - APT_TRUST
  - APT_UPDATE_BYPASS
  - BINS
  - GLOBAL_BINS_BYPASS
  - DIR
  - DIRS
  - FILES
  - DIR_BYPASS
  - OPT_BYPASS
  - SRV_BYPASS
  - ETC_BYPASS
  - VAR_BYPASS
  - LOG_BYPASS
  - SPOOL_BYPASS
  - CACHE_BYPASS
  - SRC_BYPASS
  - PID_BYPASS
  - RUN_BYPASS
  - SHARE_BYPASS
  - LINKS
  - LINK_BYPASS
  - PKGS
  - PKGSET
  - PKGSETS
  - REPO
  - REPO_DIR
  - REPOS
  - HG_REPO
  - SVN_REPO
  - GIT_DIR
  - WITH
  - ENABLE
CA_EXPIRY: "26280h"
HOMEDIR: "/home/{{USER|default(OWNER)|default(_cf_user_id)}}/"
GIT_DIR: "{{REPO_DIR|default(DIR, true)}}"
__DEST: "{{item.dest|default(item.name|default(item|default(DIR)))|defaultDir(__defaultDir|default(DIR))}}"
MULTISTRAP_COMPONENTS:
  - main
  - contrib
  - non-free
  - non-free-firmware

_ext: "{{ '.' + item.ext if item.ext|default(False) else '' }}"

FILES_BIN_HEADER: "{{ lookup('file', 'files/_bin.header') }}"
FILES_BIN_FOOTER: "{{ lookup('file', 'files/_bin.footer') }}"

CONFIG_EXT: conf
CONFIG_OUTPUT: "${DIR}/etc/${CONFIG_KEY}.${CONFIG_EXT}"

_binsRun: "{{ BINS_BYPASS|default(False) is falsy and BINS_RUN_BYPASS|default(False) is falsy }}"
_postRun: "{{ 'postRun' if _binsRun else 'skip' }}"

# standard subsystem evaluation contract
# data dependencies (task-local vars):
# - items: array/list of subsystem input rows
# - subsystem_name: subsystem id used for automatic bypass variable resolution
# optional task-local metadata:
# - subsystem_domain: broad domain label (for example: kernel)
# - subsystem_bypass_vars: bypass override; true enables defaults, [true, "X"] extends defaults, ["X"] replaces defaults
# optional overrides:
# - requested, bypassed, valid, errorChecks
errorChecks: []
errors: "{{ errorChecks | selectattr('failed', 'truthy') | map(attribute='msg') | list }}"
_subsystem_requested: "{{ requested | default((items | default([], true) | arrayitize | length > 0), true) | bool }}"
_subsystem_bypassed: "{{ bypassed | default((subsystem_name | default('') | subsystem_bypassed(subsystem_bypass_vars | default(none, true), subsystem_domain | default(none, true))), true) | bool }}"
_subsystem_valid: "{{ valid | default(errors | length == 0) | bool }}"
_subsystem_active: "{{ _subsystem_requested and (not _subsystem_bypassed) and _subsystem_valid }}"
_subsystem_status: "{{ 'active' if _subsystem_active else 'bypassed' if _subsystem_bypassed else 'invalid' if not _subsystem_valid else 'requested' }}"
_subsystem_base:
  status: "{{ _subsystem_status }}"
  requested: "{{ _subsystem_requested }}"
  bypassed: "{{ _subsystem_bypassed }}"
  valid: "{{ _subsystem_valid }}"
  active: "{{ _subsystem_active }}"
  reasons: "{{ errors }}"

SUBSYSTEM:
  go:
    requested: "{{ GO is deftruthy }}"
    bypassed: "{{ 'go' | subsystem_bypassed() }}"
    valid: true
    active: "{{ GO is deftruthy and not ('go' | subsystem_bypassed()) }}"
    contrib:
      BINS:
        - name: build.sh
          run: "{{ BINS_RUN_BYPASS is not deftruthy }}"
          basedir: repo
          generated: |
            go build -o ${GO_BIN:-$TYPE} ${GO_TARGET:-./...}
        - name: install.sh
          basedir: repo
          generated: |
            [ -n "${INSTALL_BIN-}" ] || INSTALL_BIN="${GO_BIN:-$TYPE}"
            ln -sfv "$(pwd)/${INSTALL_BIN}" $GLOBAL_BINS_DIR/$(basename $INSTALL_BIN)
      ENV:
        GO_BIN: "{{ GO_BIN | default(omit) }}"
        GO_TARGET: "{{ GO_TARGET | default('./...') }}"
      TOOL_VERSIONS:
        go: true

  nodejs:
    requested: "{{ NODEJS is deftruthy }}"
    bypassed: "{{ 'nodejs' | subsystem_bypassed() }}"
    valid: true
    active: "{{ NODEJS is deftruthy and not ('nodejs' | subsystem_bypassed()) }}"
    contrib:
      BINS: "{{ (_nodejs_build_bins if BUILD_BYPASS is not deftruthy else []) + (_nodejs_install_bins if INSTALL_BYPASS is not deftruthy else []) }}"
      ENV: "{{ ({'NODEJS_BIN': NODEJS_BIN}) if NODEJS_BIN is defined else ({}) }}"
      TOOL_VERSIONS:
        nodejs: true

  bun:
    requested: "{{ BUN is deftruthy }}"
    bypassed: "{{ 'bun' | subsystem_bypassed() }}"
    valid: true
    active: "{{ BUN is deftruthy and not ('bun' | subsystem_bypassed()) }}"
    contrib:
      BINS: "{{ (_bun_build_bins if BUILD_BYPASS is not deftruthy else []) + (_bun_install_bins if INSTALL_BYPASS is not deftruthy else []) }}"
      ENV: "{{ ({'BUN_BIN': BUN_BIN}) if BUN_BIN is defined else ({}) }}"
      TOOL_VERSIONS:
        bun: true

  npm:
    requested: "{{ NPM_PACKAGE is deftruthy }}"
    bypassed: "{{ 'npm' | subsystem_bypassed() }}"
    valid: true
    active: "{{ NPM_PACKAGE is deftruthy and not ('npm' | subsystem_bypassed()) }}"
    spec:
      npm_package_bin: "{{ NPM_PACKAGE_BIN | default((NPM_PACKAGE | default('')) | regex_replace('(?:@[\\w.-]+/)?([\\w.-]+)(?:@[\\w.-]+)?', '\\1')) }}"
    contrib:
      BINS:
        - name: build.sh
          generated: |
            curl $(npm view $NPM_PACKAGE dist.tarball) | tar -xz --strip-components=1
            pnpm i
            if jq -e '.scripts.build' package.json > /dev/null 2>&1; then
              echo "Building package..."
              pnpm build
            fi
            pnpm link
      ENV:
        NPM_PACKAGE: "{{ NPM_PACKAGE | default(omit) }}"
      TOOL_VERSIONS:
        nodejs: true
        pnpm: true

  rust:
    requested: "{{ RUST is deftruthy }}"
    bypassed: "{{ 'rust' | subsystem_bypassed() }}"
    valid: true
    active: "{{ RUST is deftruthy and not ('rust' | subsystem_bypassed()) }}"
    contrib:
      BINS:
        - name: build.sh
          run: "{{ BINS_RUN_BYPASS is not deftruthy }}"
          basedir: repo
          generated: |
            if [[ -z "${RELEASE+x}" ]]; then
                RELEASE="--release"
            elif [[ "$RELEASE" == "debug" ]]; then
                unset RELEASE
            else
                RELEASE="--$RELEASE"
            fi
            cargo build $RELEASE
        - name: install.sh
          basedir: repo
          generated: |
            [ -n "${INSTALL_BIN-}" ] || INSTALL_BIN="${RUST_BIN:-{{ TYPE }}}"
            ln -sfv "$(pwd)/target/release/${INSTALL_BIN}" $GLOBAL_BINS_DIR/$(basename $INSTALL_BIN)
        - name: install-user.sh
          basedir: repo
          generated: |
            cargo install --path .
      ENV: "{{ ({'RUST_BIN': RUST_BIN}) if RUST_BIN is defined else ({}) }}"
      TOOL_VERSIONS:
        rust: true

_nodejs_build_bins:
  - name: build.sh
    run: "{{ BUILD_RUN_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
    basedir: repo
    generated: |
      if [ -f package-lock.json ] && [ ! -f pnpm-lock.yaml ]; then
        pnpm import
      fi
      pnpm i --frozen
      if jq -e '.scripts.build' package.json > /dev/null 2>&1; then
        echo "Building package..."
        pnpm build
      fi
_nodejs_install_bins:
  - name: install.sh
    run: "{{ INSTALL_RUN_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
    basedir: repo
    generated: |
      if [ -n "{{ NODEJS_LINK_DIR | default('') }}" ]; then
        IFS=',' read -ra _cf_link_dirs <<< "{{ NODEJS_LINK_DIR | default('.') }}"
        for _cf_dir in "${_cf_link_dirs[@]}"; do
          (cd "$_cf_dir" && pnpm link -g)
        done
      else
        pnpm link -g
      fi

_bun_build_bins:
  - name: build.sh
    run: "{{ BUILD_RUN_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
    basedir: repo
    generated: |
      bun install
_bun_install_bins:
  - name: install.sh
    run: "{{ INSTALL_RUN_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
    basedir: repo
    generated: |
      bun link -g
