---
# primary directories
NAME: "{{TYPE}}{{'-'+INSTANCE if INSTANCE is defined else ''}}"
TYPE: "{{ (lookup('file', '/proc/self/cmdline') | regex_replace('\u0000',' ')|ansible_cmdline).type }}"
INSTANCE_CMDLINE: "{{ (lookup('file', '/proc/self/cmdline') | regex_replace('\u0000',' ')|ansible_cmdline).instance }}"
INSTANCE: "{{ 'git' if INSTANCE_CMDLINE|def == 'src' and REPO|def is defined else 'main' }}"
BINS_DIR: "{{DIR}}/bin"
GLOBAL_BINS_DIR: /usr/local/bin
SRVS_DIR: /srv
OPTS_DIR: /opt
ETCS_DIR: /etc/opt
REPOS_DIR: /etc/opt
VARS_DIR: /var/lib
LOGS_DIR: /var/log
SPOOLS_DIR: /var/spool
CACHES_DIR: /var/cache
PIDS_DIR: /var/run
RUNS_DIR: /var/run
SRCS_DIR: /usr/local/src
ARCHIVE_SRC: "{{HOMEDIR}}archive/{{REPO_ORG}}/{{REPO_NAME}}"
SHARES_DIR: /usr/share

# Archive download mode
ARCHIVE_DOWNLOAD: true
ARCHIVE_DIR: "{{HOMEDIR}}archive"

USERMODE_BINS_DIR: "{{BINS_DIR}}"
USERMODE_ETCS_DIR: "{{XDG_CONFIG_HOME}}"
USERMODE_CACHE_DIR: "{{XDG_CACHE_HOME}}/.cache"
USERMODE_LOCAL_DIR: "{{XDG_DATA_HOME|dirname}}"
USERMODE_GLOBAL_BINS_DIR: "{{USERMODE_LOCAL_DIR}}/bin"
USERMODE_OPTS_DIR: "{{USERMODE_LOCAL_DIR}}/opt"
USERMODE_SRVS_DIR: "{{USERMODE_LOCAL_DIR}}/srv"
USERMODE_VARS_DIR: "{{USERMODE_LOCAL_DIR}}/var/lib"
USERMODE_SRCS_DIR: "{{HOMEDIR}}/src"
USERMODE_LOGS_DIR: "{{USERMODE_VARS_DIR}}/log"
USERMODE_SPOOLS_DIR: "{{USERMODE_VARS_DIR}}/spool"
USERMODE_CACHES_DIR: "{{HOMEDIR}}/.cache"
USERMODE_MEDIAS_DIR: "{{USERMODE_LOCAL_DIR}}/media"
USERMODE_SHARES_DIR: "{{USERMODE_LOCAL_DIR}}/usr/share"

REPO_DIR: "{{SRC}}"
REPO_LINK_DIR: repo
BUILD_DIR_DIR: "{{REPO_DIR}}"
BUILD_DIR: "{{BUILD_DIR_DIR}}/build"
_BUILD_DIR: "{{BUILD_DIR|defaultDir(BUILD_DIR_DIR)}}"
WORKDIR_BIN: /usr/share/doc/git/contrib/workdir/git-new-workdir
PKGCONFIG_DIR: "/usr/local/lib/pkgconfig"
PKGSS_DIR: "{{SRCS_DIR}}"
SPECS_DIR: "{{SRCS_DIR}}/spec"
SYSCTL_DIR: "/etc/sysctl.d"
WWW_LINKS_D: /etc/lighttpd2/links.d
NGINX: /etc/nginx
# package installation config
APT_INSTALL: latest
APT_BYPASS: False
APT_DEFAULT_COMPONENT: main
APT_DEFAULT_DISTRIBUTION: forky
APT_DEFAULT_ARCH: True
APT_DEFAULT_MIRROR: http://deb.debian.org/debian
APT_ARCH: amd64
UBUNTU_DISTRIBUTION: noble
TMUX_CONF_D_DIR: conf.d
BIND: 0.0.0.0
NODEJS_VERSION: 25
PNPM_VERSION: 10
BUN_VERSION: 1
GO_VERSION: 1
RUST_VERSION: 1
PYTHON_VERSION: 3
YARN_VERSION: 4

DIRSET:
  - opt
  - srv
  - etc
  - var
  - log
  - spool
  - cache
  - src
  - pid
  - share
FONTS_TTF: /usr/share/fonts/truetype
MEDIAS_DIR: /srv/media
SYSTEMD_SYSTEM_UNIT_DIR: /etc/systemd/system
DIRMODE: "0770"
FILEMODE: "0660"
BINMODE: "0775"
GOPATH_DIR: "src/{{go_url|default('')|deprefix('\\w+@')|deprefix('https?://')|regex_replace('^(\\w+):', '\\1/')|trim}}"
HASH: "#"
PERSIST_VARS:
  - NAME
  - INSTANCE
  - DIR
  - PREFIX
  - USER
  - USERMODE
  - OWNER
  - APT_COMPONENT
  - APT_COMPONENTS
  - APT_TRUSTED
  - APT_SOURCELIST
  - APT_TRUST
  - APT_UPDATE_BYPASS
  - BINS
  - GLOBAL_BINS_BYPASS
  - DIR
  - DIRS
  - FILES
  - DIR_BYPASS
  - OPT_BYPASS
  - SRV_BYPASS
  - ETC_BYPASS
  - VAR_BYPASS
  - LOG_BYPASS
  - SPOOL_BYPASS
  - CACHE_BYPASS
  - SRC_BYPASS
  - PID_BYPASS
  - RUN_BYPASS
  - SHARE_BYPASS
  - LINKS
  - LINK_BYPASS
  - PKGS
  - PKGSET
  - PKGSETS
  - REPO
  - REPO_DIR
  - REPOS
  - HG_REPO
  - SVN_REPO
  - GIT_DIR
  - WITH
  - ENABLE
CA_EXPIRY: "26280h"
HOMEDIR: "/home/{{USER|default(OWNER)|default(_cf_user_id)}}/"
GIT_DIR: "{{REPO_DIR|default(DIR, true)}}"
__DEST: "{{item.dest|default(item.name|default(item|default(DIR)))|defaultDir(__defaultDir|default(DIR))}}"
MULTISTRAP_COMPONENTS:
  - main
  - contrib
  - non-free
  - non-free-firmware

_ext: "{{ '.' + item.ext if item.ext|default(False) else '' }}"

FILES_BIN_HEADER: "{{ lookup('file', 'files/_bin.header') }}"
FILES_BIN_FOOTER: "{{ lookup('file', 'files/_bin.footer') }}"

CONFIG_EXT: conf
CONFIG_OUTPUT: "${DIR}/etc/${CONFIG_KEY}.${CONFIG_EXT}"

_binsRun: "{{ BINS_BYPASS|default(False) is falsy and BINS_RUN_BYPASS|default(False) is falsy }}"
_postRun: "{{ 'postRun' if _binsRun else 'skip' }}"

# standard subsystem evaluation contract
# data dependencies (task-local vars):
# - items: array/list of subsystem input rows
# - subsystem_name: subsystem id used for automatic bypass variable resolution
# optional task-local metadata:
# - subsystem_domain: broad domain label (for example: kernel)
# - subsystem_bypass_vars: bypass override; true enables defaults, [true, "X"] extends defaults, ["X"] replaces defaults
# optional overrides:
# - requested, bypassed, valid, errorChecks
errorChecks: []
errors: "{{ errorChecks | selectattr('failed', 'truthy') | map(attribute='msg') | list }}"
_subsystem_requested: "{{ requested | default((items | default([], true) | arrayitize | length > 0), true) | bool }}"
_subsystem_bypassed: "{{ bypassed | default(lookup('subsys', id=subsystem_name | default(''), domain=subsystem_domain | default(none), bypass=subsystem_bypass_vars | default(none), get='bypassed', default=False), true) | bool }}"
_subsystem_valid: "{{ valid | default(errors | length == 0) | bool }}"
_subsystem_active: "{{ _subsystem_requested and (not _subsystem_bypassed) and _subsystem_valid }}"

SUBSYSTEM:
  go:
    contrib:
      BINS:
        - name: build.sh
          run: "{{ BINS_RUN_BYPASS is not deftruthy }}"
          basedir: repo
          generated: |
            go build -o ${GO_BIN:-$TYPE} ${GO_TARGET:-./...}
        - name: install.sh
          basedir: repo
          generated: |
            [ -n "${INSTALL_BIN-}" ] || INSTALL_BIN="${GO_BIN:-$TYPE}"
            ln -sfv "$(pwd)/${INSTALL_BIN}" $GLOBAL_BINS_DIR/$(basename $INSTALL_BIN)
      ENV:
        GO_BIN: "{{ GO_BIN | default(omit) }}"
        GO_TARGET: "{{ GO_TARGET | default('./...') }}"
      TOOL_VERSIONS:
        go: true

  nodejs:
    contrib:
      BINS:
        - name: build.sh
          run: "{{ BUILD_RUN_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
          basedir: repo
          generated: |
            if [ -f package-lock.json ] && [ ! -f pnpm-lock.yaml ]; then
              pnpm import
            fi
            pnpm i --frozen
            if jq -e '.scripts.build' package.json > /dev/null 2>&1; then
              echo "Building package..."
              pnpm build
            fi
        - name: install.sh
          #run: "{{ INSTALL_RUN_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
          basedir: repo
          generated: |
            if [ -n "{{ NODEJS_LINK_DIR | default('') }}" ]; then
              IFS=',' read -ra _cf_link_dirs <<< "{{ NODEJS_LINK_DIR | default('.') }}"
              for _cf_dir in "${_cf_link_dirs[@]}"; do
                (cd "$_cf_dir" && pnpm link -g)
              done
            else
              pnpm link -g
            fi
      ENV: "{{ ({'NODEJS_BIN': NODEJS_BIN}) if NODEJS_BIN is defined else ({}) }}"
      TOOL_VERSIONS:
        nodejs: true

  bun:
    contrib:
      BINS:
        - name: build.sh
          run: "{{ BUILD_RUN_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
          basedir: repo
          generated: |
            bun install
        - name: install.sh
          run: "{{ INSTALL_RUN_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
          basedir: repo
          generated: |
            bun link -g
      ENV: "{{ ({'BUN_BIN': BUN_BIN}) if BUN_BIN is defined else ({}) }}"
      TOOL_VERSIONS:
        bun: true

  npm:
    spec:
      npm_package_bin: "{{ NPM_PACKAGE_BIN | default((NPM_PACKAGE | default('')) | regex_replace('(?:@[\\w.-]+/)?([\\w.-]+)(?:@[\\w.-]+)?', '\\1')) }}"
    contrib:
      BINS:
        - name: build.sh
          generated: |
            curl $(npm view $NPM_PACKAGE dist.tarball) | tar -xz --strip-components=1
            pnpm i
            if jq -e '.scripts.build' package.json > /dev/null 2>&1; then
              echo "Building package..."
              pnpm build
            fi
            pnpm link
      ENV:
        NPM_PACKAGE: "{{ NPM_PACKAGE | default(omit) }}"
      TOOL_VERSIONS:
        nodejs: true
        pnpm: true

  rust:
    contrib:
      BINS:
        - name: build.sh
          run: "{{ BINS_RUN_BYPASS is not deftruthy }}"
          basedir: repo
          generated: |
            if [[ -z "${RELEASE+x}" ]]; then
                RELEASE="--release"
            elif [[ "$RELEASE" == "debug" ]]; then
                unset RELEASE
            else
                RELEASE="--$RELEASE"
            fi
            cargo build $RELEASE
        - name: install.sh
          basedir: repo
          generated: |
            [ -n "${INSTALL_BIN-}" ] || INSTALL_BIN="${RUST_BIN:-{{ TYPE }}}"
            ln -sfv "$(pwd)/target/release/${INSTALL_BIN}" $GLOBAL_BINS_DIR/$(basename $INSTALL_BIN)
        - name: install-user.sh
          basedir: repo
          generated: |
            cargo install --path .
      ENV: "{{ ({'RUST_BIN': RUST_BIN}) if RUST_BIN is defined else ({}) }}"
      TOOL_VERSIONS:
        rust: true

  cmake:
    requested: "{{ CMAKE is deftruthy or CMAKE_ARGS is defined or CMAKE_BUILDS is defined }}"
    contrib:
      BINS: "{{ _cmake_bins }}"
      PKGS: [cmake, ninja-build]
      ENV: "{{ _cmake_env }}"

  python:
    requested: "{{ PYTHON is deftruthy or PIP is defined }}"
    contrib:
      BINS:
        - name: build.sh
          run: "{{ BINS_RUN_BYPASS is not deftruthy }}"
          basedir: repo
          generated: |
            [ -d .venv ] || uv venv
            {% if PIP is defined %}
            uv pip install -r etc/pip.txt
            {% else %}
            if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
              uv pip install -e .
            elif [ -f requirements.txt ]; then
              uv pip install -r requirements.txt
            fi
            {% endif %}
            source {{ DIR }}/bin/venv.source
        - name: venv.source
          basedir: repo
          generated: |
            . "$(pwd)/.venv/bin/activate"
      ENV: "{{ ({'PYTHON_BIN': PYTHON_BIN}) if PYTHON_BIN is defined else ({}) | combine({} if ENV | def(True) == True else ENV) }}"
      ETC_FILES: "{{ [{'name': 'pip.txt', 'content': (PIP | join('\\n') if PIP is iterable and PIP is not string else PIP | default(''))}] if PIP is defined else [] }}"
      TOOL_VERSIONS:
        python: true

  repo_npm:
    requested: "{{ REPO_NPM is defined }}"
    contrib:
      BINS:
        - name: install.sh
          run: "{{ INSTALL_RUN_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
          generated: |
            pnpm install -g $(cat etc/npm.txt)
      ETC_FILES:
        - name: npm.txt
          content: |
            {{ REPO_NPM }}
      TOOL_VERSIONS:
        nodejs: true
        pnpm: true

  desktop:
    requested: "{{ DESKTOP is defined }}"
    contrib:
      BINS:
        - name: install-desktop.sh
          generated: |
            {% for entry in (DESKTOP | default([], true) | arrayitize) %}
            {% set df = entry.desktop_file %}
            {% set exec_val = entry.exec | default('') %}
            {% set icon_val = entry.icon | default('') %}
            {% set set_path = entry.path | default(false) | bool %}
            mkdir -p $HOME/.local/share/applications
            desktop-file-install \
              --dir="$HOME/.local/share/applications" \
            {%- if exec_val %}
              --set-key=Exec --set-value="{{ exec_val }}" \
            {%- endif %}
            {%- if icon_val %}
              --set-key=Icon --set-value="$REPO_DIR/{{ icon_val }}" \
            {%- endif %}
            {%- if set_path %}
              --set-key=Path --set-value="$REPO_DIR" \
            {%- endif %}
              "$REPO_DIR/{{ df }}"
            {% endfor %}
      PKGS: [desktop-file-utils]

  kernel_modprobe:
    requested: "{{ KERNEL_MODULES is defined and KERNEL_MODULES is mapping and (KERNEL_MODULES | length > 0) }}"
    contrib:
      ETC_FILES:
        - name: kernel.modules.json
          content: "{{ KERNEL_MODULES | to_nice_json }}"
      BINS: "{{ _kernel_modprobe_bins }}"
      ENV:
        KERNEL_MODULES_JSON: "{{ DIR }}/etc/kernel.modules.json"
      ENV_LIST: [KERNEL_MODULES_JSON]
      PKGS: [jq]

  kernel_sysctl:
    requested: "{{ KERNEL_SYSCTL is defined and KERNEL_SYSCTL is mapping and (KERNEL_SYSCTL | length > 0) }}"
    contrib:
      ETC_FILES:
        - name: kernel.sysctl.json
          content: "{{ KERNEL_SYSCTL | to_nice_json }}"
      BINS: "{{ _kernel_sysctl_bins }}"
      ENV:
        KERNEL_SYSCTL_JSON: "{{ DIR }}/etc/kernel.sysctl.json"
      ENV_LIST: [KERNEL_SYSCTL_JSON]
      PKGS: [jq]

  kernel_sysfs:
    requested: "{{ KERNEL_SYSFS is defined and KERNEL_SYSFS is mapping and (KERNEL_SYSFS | length > 0) }}"
    contrib:
      ETC_FILES:
        - name: kernel.sysfs.json
          content: "{{ KERNEL_SYSFS | to_nice_json }}"
      BINS: "{{ _kernel_sysfs_bins }}"
      ENV:
        KERNEL_SYSFS_JSON: "{{ DIR }}/etc/kernel.sysfs.json"
      ENV_LIST: [KERNEL_SYSFS_JSON]
      PKGS: [jq]

_cmake_source_default: "{{ CMAKE_SOURCE_DIR | default('.') }}"
_cmake_builds_raw: "{{ CMAKE_BUILDS | default([]) | arrayitize }}"
_cmake_default_build:
  name: default
  build_dir: "{{ _BUILD_DIR }}"
  source_dir: "{{ _cmake_source_default }}"
  generator: "{{ CMAKE_GENERATOR | default('Ninja') }}"
  args: "{{ CMAKE_ARGS | default('') }}"
  build_type: "{{ CMAKE_BUILD_TYPE | default('Release') }}"
  configure_always: "{{ CMAKE_CONFIGURE_ALWAYS | default(False) }}"
  install: "{{ CMAKE_INSTALL is defined }}"
_cmake_builds: "{{ _cmake_builds_raw if _cmake_builds_raw | length > 0 else [_cmake_default_build] }}"
_cmake_install_args_global: >-
  {{
    CMAKE_INSTALL | arrayitize | join(' ')
    if (CMAKE_INSTALL is defined and CMAKE_INSTALL != True)
    else ''
  }}
_cmake_env:
  BUILD_DIR_CF_CM: "{{ _BUILD_DIR }}"
  CMAKE_GENERATOR: "{{ CMAKE_GENERATOR | default(omit) }}"
  CMAKE_BUILD_TYPE: "{{ CMAKE_BUILD_TYPE | default('Release') }}"
  CMAKE_INSTALL_BIN: "{{ CMAKE_INSTALL_BIN | default(omit) }}"
_cmake_bins:
  - name: build.sh
    run: "{{ BINS_RUN_BYPASS is not deftruthy }}"
    basedir: "{{ REPO_DIR }}"
    generated: |
      {% for cmakeBuild in _cmake_builds %}
      {% set generator = cmakeBuild.generator | default(CMAKE_GENERATOR | default('Ninja')) %}
      {% set configureArgs = cmakeBuild.args | default(CMAKE_ARGS | default([])) | arrayitize | join(' ') %}
      {% set buildTarget = cmakeBuild.build_target | default(CMAKE_BUILD_TARGET | default(False)) %}
      {% set buildType = cmakeBuild.build_type | default(CMAKE_BUILD_TYPE | default(False)) %}
      {% set buildArgs = cmakeBuild.build_args | default(CMAKE_BUILD_ARGS | default([])) | arrayitize | join(' ') %}
      echo "CMake build: {{ cmakeBuild.name | default('default') }}"

      BUILD_DIR="{{ cmakeBuild.build_dir | default(_BUILD_DIR) }}"
      SOURCE_DIR="{{ cmakeBuild.source_dir | default(_cmake_source_default) }}"
      CONFIGURE_STATE="$BUILD_DIR/.compfuzor-cmake-configure.txt"
      CONFIGURE_STATE_NEXT="$BUILD_DIR/.compfuzor-cmake-configure.next.txt"
      SHOULD_CONFIGURE=0

      mkdir -p "$BUILD_DIR"

      cat > "$CONFIGURE_STATE_NEXT" <<'EOF'
      generator={{ generator }}
      source_dir={{ cmakeBuild.source_dir | default(_cmake_source_default) }}
      args:
      {{ configureArgs | trim }}
      EOF

      {% if cmakeBuild.configure_always | default(CMAKE_CONFIGURE_ALWAYS | default(False)) | bool %}
      SHOULD_CONFIGURE=1
      {% else %}
      if [ ! -f "$BUILD_DIR/CMakeCache.txt" ]; then
        SHOULD_CONFIGURE=1
      elif [ ! -f "$CONFIGURE_STATE" ]; then
        mv "$CONFIGURE_STATE_NEXT" "$CONFIGURE_STATE"
      elif cmp -s "$CONFIGURE_STATE" "$CONFIGURE_STATE_NEXT"; then
        rm -f "$CONFIGURE_STATE_NEXT"
      else
        SHOULD_CONFIGURE=1
      fi
      {% endif %}

      if [ "$SHOULD_CONFIGURE" -eq 1 ]; then
        cmake -G "{{ generator }}" -B "$BUILD_DIR" -S "$SOURCE_DIR" {{ configureArgs }}
        mv "$CONFIGURE_STATE_NEXT" "$CONFIGURE_STATE"
      else
        echo "Already configured, skipping configure for $BUILD_DIR"
      fi

      cmake --build "$BUILD_DIR"{% if buildTarget %} --target {{ buildTarget }}{% endif %}{% if buildType %} --config {{ buildType }}{% endif %}{% if buildArgs %} {{ buildArgs }}{% endif %}
      {% endfor %}
  - name: install.sh
    basedir: repo
    generated: |
      {% if CMAKE_INSTALL is defined %}
      {% for cmakeBuild in _cmake_builds if cmakeBuild.install | default(True) %}
      {% set installArgs = cmakeBuild.install_args | default([]) | arrayitize | join(' ') %}
      cmake --install "{{ cmakeBuild.build_dir | default(_BUILD_DIR) }}"{{ ' ' + _cmake_install_args_global if _cmake_install_args_global else '' }}{{ ' ' + installArgs if installArgs else '' }}
      {% endfor %}
      {% else %}
      [ -n "${INSTALL_BIN-}" ] || INSTALL_BIN="${CMAKE_INSTALL_BIN:-{{ TYPE }}}"
      ln -sfv "$(pwd)/{{ _cmake_builds[0].build_dir | default('build') }}/${INSTALL_BIN}" $GLOBAL_BINS_DIR/$(basename $INSTALL_BIN)
      {% endif %}

_kernel_modprobe_bins:
  - name: build-kernel.sh
    src: ../kernel/build-kernel.sh
    basedir: false
  - name: install-kernel.sh
    src: ../kernel/install-kernel.sh
    basedir: false
    #run: "{{ INSTALL_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
  - name: apply-kernel.sh
    src: ../kernel/apply-kernel.sh
    basedir: false
    #run: "{{ APPLY_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
  - name: detect-builtin.sh
    src: ../kernel/detect-builtin.sh
    basedir: false
  - name: install-kernel-cmdline.sh
    src: ../kernel/install-kernel-cmdline.sh
    basedir: false
_kernel_sysctl_bins:
  - name: build-sysctl.sh
    src: ../kernel/build-sysctl.sh
    basedir: false
  - name: install-sysctl.sh
    src: ../kernel/install-sysctl.sh
    basedir: false
    #run: "{{ INSTALL_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
  - name: apply-sysctl.sh
    src: ../kernel/apply-sysctl.sh
    basedir: false
    #run: "{{ APPLY_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
_kernel_sysfs_bins:
  - name: build-sysfs.sh
    src: ../kernel/build-sysfs.sh
    basedir: false
  - name: install-sysfs.sh
    src: ../kernel/install-sysfs.sh
    basedir: false
    #run: "{{ INSTALL_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
  - name: apply-sysfs.sh
    src: ../kernel/apply-sysfs.sh
    basedir: false
    #run: "{{ APPLY_BYPASS is not deftruthy and BINS_RUN_BYPASS is not deftruthy }}"
